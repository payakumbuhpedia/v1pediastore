<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V1PEDIASTORE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- PARTICLE BG -->
<canvas id="bg"></canvas>

<!-- LOADING -->
<div id="loading">
  <div class="logo">💎</div>
  <h2>V1PEDIASTORE</h2>
  <div class="bar"><div id="barFill"></div></div>
</div>

<!-- CLICK FX -->
<div id="fx">💎</div>

<!-- HEADER -->
<div class="header">
  <h1 class="neon">💎 V1PEDIASTORE 💎</h1>
  <p class="typing">Layanan Digital Super Cepat & Premium ⚡</p>
</div>

<!-- MENU -->
<div class="menu">

  <div class="card" onclick="nav('panelPage',this)">
    📦
    <h3>Panel Bot</h3>
  </div>

  <div class="card" onclick="nav('followersPage',this)">
    📈
    <h3>Followers IG</h3>
  </div>

</div>

<!-- PANEL -->
<div id="panelPage" class="page">
  <h2>Panel Pterodactyl</h2>
  <div id="panel-list" class="grid"></div>
</div>

<!-- FOLLOWERS -->
<div id="followersPage" class="page">
  <h2>Followers Indonesia</h2>
  <div id="followers-list" class="grid"></div>
</div>

<!-- CART -->
<div id="cartPage" class="page">
  <h2>Keranjang</h2>
  <div id="cartList"></div>
  <h3 id="total">Total: Rp0</h3>

  <button onclick="orderWA()">Order</button>
  <button onclick="clearCart()">Hapus</button>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="nav('home',this)">🏠</div>
  <div onclick="nav('cartPage',this)">🛒</div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
