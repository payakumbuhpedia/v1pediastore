<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V1PEDIASTORE</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f1f4f9;}
.page{display:none;padding-bottom:80px;}
.active{display:block;}

.header{
background:linear-gradient(135deg,#4e73df,#6c8cff);
color:white;padding:25px;text-align:center;
}

.card{
background:white;margin:15px;padding:15px;border-radius:15px;
}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.item{
background:#f1f2f6;padding:12px;border-radius:10px;
text-align:center;cursor:pointer;
}

.nav{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:space-around;
background:white;padding:10px;
}

.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);display:none;
justify-content:center;align-items:center;
}

.modal-content{
background:white;padding:20px;border-radius:15px;width:90%;
}
</style>
</head>

<body>

<div id="home" class="page active">
<div class="header"><h2>V1PEDIASTORE</h2></div>

<div class="card">
<div class="grid">
<div class="item" onclick="go('order')">Panel</div>
<div class="item" onclick="go('order')">Followers</div>
</div>
</div>
</div>

<div id="order" class="page">
<div class="header"><h3>Order</h3></div>

<div class="card">
<h3>Panel</h3>
<div class="grid" id="panelList"></div>
</div>

<div class="card">
<h3>Followers</h3>
<div class="grid" id="followersList"></div>
</div>
</div>

<div id="track" class="page">
<div class="header"><h3>Tracking</h3></div>
<div id="tracking"></div>
</div>

<div id="modal" class="modal">
<div class="modal-content">
<p id="produk"></p>
<p id="harga"></p>
<button onclick="kirim()">Bayar</button>
<button onclick="closeModal()">Batal</button>
</div>
</div>

<div class="nav">
<div onclick="go('home')">Home</div>
<div onclick="go('order')">Order</div>
<div onclick="go('track')">Tracking</div>
</div>

<script>
const firebaseConfig={
apiKey:"ISI",
authDomain:"ISI",
projectId:"ISI"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

function go(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

const panelList=document.getElementById("panelList");
const followersList=document.getElementById("followersList");

const hargaPanel=[2000,3000,4000,5000,6000,7000,8000,9000,10000,11000,12000];

for(let i=1;i<=11;i++){
panelList.innerHTML+=`<div class="item" onclick="openPay('${i}GB Panel',${hargaPanel[i-1]})">${i}GB</div>`;
}

for(let i=1;i<=50;i++){
followersList.innerHTML+=`<div class="item" onclick="openPay('${i}K Followers',${i*40000})">${i}K</div>`;
}

let prod="",harga=0;

function openPay(p,h){
prod=p;
harga=h;
document.getElementById("produk").innerText=p;
document.getElementById("harga").innerText="Rp "+h;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function kirim(){
db.collection("orders").add({
produk:prod,
harga:harga,
status:"Pending"
});
alert("Order berhasil!");
closeModal();
}
</script>

</body>
</html>
