<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V1PEDIA STORE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>V1PEDIASTORE</h1>
  <p>Trusted Digital Services</p>
</div>

<!-- BRAND -->
<div class="card brand-card">
  <h2>V1 PEDIA STORE ☑️</h2>
  <p>Fast Response • Aman • Bergaransi</p>
</div>

<!-- STATS -->
<div class="card stats">
  <div><b id="sold">23.5K</b>Terjual</div>
  <div><b>13K</b>Pelanggan</div>
  <div><b>98%</b>Kepuasan</div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab(event,'panel')">Panel Bot WA</div>
  <div class="tab" onclick="switchTab(event,'followers')">Followers IG</div>
</div>

<!-- LIST -->
<div id="panel-list" class="list"></div>
<div id="followers-list" class="list" style="display:none;"></div>

<!-- KERANJANG -->
<div class="card">
  <h2>Keranjang</h2>
  <div id="cartList"></div>
  <h3 id="total">Total: Rp0</h3>
  <button class="btn" onclick="orderWA()">Order ke WhatsApp</button>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div onclick="navClick(this);scrollToTop()">🏠<br>Home</div>
  <div onclick="navClick(this);scrollToCart()">🛒<br>Keranjang</div>
  <div onclick="navClick(this);toggleDark()">👤<br>Profile</div>
</div>

<!-- POPUP -->
<div id="popup" class="popup"> ☑️Ditambahkan</div>

<!-- LIVE ORDER -->
<div id="liveOrder" class="live-order"></div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
