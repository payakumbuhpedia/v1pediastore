<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V1PEDIA STORE</title>
  <link rel="stylesheet" href="style.css">

  <style>
  /* LOADING */
  #loading{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:linear-gradient(135deg,#5f8bff,#7aa6ff);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:9999;
    color:#fff;
  }

  .logo-load{
    font-size:26px;
    font-weight:bold;
    animation:zoom 1.2s infinite alternate;
  }

  @keyframes zoom{
    from{transform:scale(1);}
    to{transform:scale(1.2);}
  }

  .hide{
    opacity:0;
    pointer-events:none;
    transition:.5s;
  }
  </style>

</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="logo-load"> V1PEDIA STORE</div>
  <div>Loading...</div>
</div>

<!-- HEADER -->
<div class="header">
  <h1>💎 V1PEDIA STORE 💎</h1>
  <p>v 1 p e d i a s t o r e</p>
</div>

<!-- BRAND -->
<div class="card brand-card">
  <h2>💎 V1PEDIA STORE 💎</h2>
  <p>Fast Response • Aman • Bergaransi</p>
</div>

<!-- STATS -->
<div class="card stats">
  <div><b id="sold">58.7K</b> Terjual</div>
  <div><b>47.9K</b> Pelanggan</div>
  <div><b>98%</b> Kepuasan</div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab(event,'panel')">Panel Bot WA</div>
  <div class="tab" onclick="switchTab(event,'followers')">Followers IG</div>
</div>

<!-- LIST -->
<div id="panel-list" class="list"></div>
<div id="followers-list" class="list" style="display:none;"></div>

<!-- KERANJANG -->
<div class="card">
  <h2>Keranjang</h2>
  <div id="cartList"></div>
  <h3 id="total">Total: Rp0</h3>
  <button class="btn" onclick="orderWA()">Order ke WhatsApp</button>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div onclick="navClick(this);scrollToTop()">🏠<br>Home</div>
  <div onclick="navClick(this);scrollToCart()">🛒<br>Keranjang</div>
  <div onclick="navClick(this);toggleDark()">👤<br>Profile</div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">💎 Ditambahkan</div>

<!-- LIVE ORDER -->
<div id="liveOrder" class="live-order"></div>

<script src="data.js"></script>
<script src="script.js"></script>

<script>
/* LOADING HILANG */
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("loading").classList.add("hide");
  },1500);
});
</script>

</body>
</html>
