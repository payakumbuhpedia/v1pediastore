<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V1PEDIASTORE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="diamond">💎</div>
  <div class="title">V1PEDIASTORE</div>
  <div class="diamond">💎</div>

  <div class="subtitle">
    Layanan Digital Super Cepat & Premium ⚡
  </div>
</div>

<!-- ================= HOME ================= -->
<div id="home" class="page active">

  <div class="menu-grid">

    <div class="menu-card" onclick="nav('panelPage',this)">
      📦
      <h3>Panel Bot</h3>
    </div>

    <div class="menu-card" onclick="nav('followersPage',this)">
      📈
      <h3>Followers IG</h3>
    </div>

  </div>

</div>

<!-- ================= PANEL ================= -->
<div id="panelPage" class="page">
  <h2>Panel Bot WhatsApp</h2>
  <div id="panel-list"></div>
</div>

<!-- ================= FOLLOWERS ================= -->
<div id="followersPage" class="page">
  <h2>Followers Instagram</h2>
  <div id="followers-list"></div>
</div>

<!-- ================= CART ================= -->
<div id="cartPage" class="page">

  <h2>Keranjang</h2>
  <div id="cartList"></div>

  <h3 id="total">Total: Rp0</h3>

  <button onclick="orderWA()" class="btn">Order WhatsApp</button>
  <button onclick="clearCart()" class="btn">Hapus</button>

</div>

<!-- FLOAT WA -->
<div class="wa-float" onclick="orderWA()">💬</div>

<!-- NAVBAR -->
<div class="navbar">
  <div onclick="nav('home',this)">🏠</div>
  <div onclick="nav('cartPage',this)">🛒 <span id="badge">0</span></div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
